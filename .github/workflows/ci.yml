name: chiba-ci

on:
  push:
  pull_request:

concurrency:
  group: chiba-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Download bootstrap main.o from releases
        env:
          RELEASE_REPO: ${{ github.repository }}
        run: |
          URL="https://github.com/${RELEASE_REPO}/releases/download/v0.6.13/main.o"
          FALLBACK_URL="https://github.com/CHIBA-LANG/chiba-level0/releases/download/v0.6.13/main.o"
          echo "downloading ${URL}"
          if ! curl -fL "$URL" -o ./main.o; then
            echo "primary download failed, fallback to ${FALLBACK_URL}"
            curl -fL "$FALLBACK_URL" -o ./main.o
          fi
          chmod +x ./main.o

      - name: Ensure executable bootstrap binary
        run: |
          chmod +x ./main.o
          test -x ./main.o

      - name: Stage 1 bootstrap
        run: ./main.o --project .

      - name: Stage 1 tests
        run: ./target/debug/main.o

      - name: Stage 2 bootstrap
        run: ./target/debug/main.o --project .

      - name: Stage 2 tests
        run: ./target/debug/main.o
