name: chiba-ci

on:
  push:
  pull_request:

concurrency:
  group: chiba-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Download bootstrap main.o from releases
        env:
          RELEASE_REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          repo = os.environ.get("RELEASE_REPO", "CHIBA-LANG/chiba-level0")
          api = f"https://api.github.com/repos/{repo}/releases/latest"

          req = urllib.request.Request(api, headers={"User-Agent": "chiba-ci"})
          with urllib.request.urlopen(req) as resp:
            data = json.load(resp)

          assets = data.get("assets", [])
          target = None
          for asset in assets:
            if asset.get("name") == "main.o":
              target = asset.get("browser_download_url")
              break

          if not target:
            print(f"main.o not found in latest release assets of {repo}", file=sys.stderr)
            sys.exit(1)

          print(f"downloading {target}")
          urllib.request.urlretrieve(target, "./main.o")
          PY
          chmod +x ./main.o

      - name: Ensure executable bootstrap binary
        run: |
          chmod +x ./main.o
          test -x ./main.o

      - name: Stage 1 bootstrap
        run: ./main.o --project .

      - name: Stage 1 tests
        run: ./target/debug/main.o

      - name: Stage 2 bootstrap
        run: ./target/debug/main.o --project .

      - name: Stage 2 tests
        run: ./target/debug/main.o
